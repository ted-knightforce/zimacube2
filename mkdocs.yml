site_name: ZimaCube 2 Pioneer Build
site_description: Documenting the full journey of building a tiered-storage, AI-capable self-hosting server on a ZimaCube 2 Standard — from unboxing to local LLMs, media streaming, and own-device privacy.
site_author: ted-knight
site_url: https://ted-knightforce.github.io/zimacube2

repo_name: ted-knightforce/zimacube2
repo_url: https://github.com/ted-knightforce/zimacube2

docs_dir: docs

theme:
  name: material
  palette:
    scheme: slate
    primary: cyan
    accent: light blue
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.code.annotate
  icon:
    repo: fontawesome/brands/github

nav:
  - Home: index.md
  - Build Phases:
    - Phase 1 — Foundation: phases/01-foundation.md
    - Phase 2 — Media Stack: phases/02-media.md
    - Phase 2.5 — Immich Migration: phases/02.5-immich.md
    - Phase 3 — Data Management: phases/03-data.md
    - Phase 4a — CPU AI (Ollama): phases/04a-cpu-ai.md
    - Phase 4b — GPU AI (RTX 4090): phases/04b-gpu-ai.md
  - Benchmarks: benchmarks/PHASE1-BENCHMARK.md

markdown_extensions:
  - tables
  - admonition
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - toc:
      permalink: true
